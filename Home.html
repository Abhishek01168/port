<meta charset="UTF-8">

<title>Navbar</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  background: #f4f4f4;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #222;
  padding: 15px;
  color: white;
  z-index: 1000;
}

.logo {
  font-size: 20px;
  font-weight: bold;
}

/* MENU */
.nav-links {
  display: flex;
  list-style: none;
}

.nav-links li {
  position: relative;
}

.nav-links a {
  color: white;
  text-decoration: none;
  padding: 10px;
  display: block;
}

/* DROPDOWN */
.dropdown-menu {
  display: none;
  position: absolute;
  background: #333;
  top: 40px;
  min-width: 150px;
  z-index: 999;
}

.dropdown-menu a {
  padding: 10px;
  z-index: 999;
}

/* SHOW DROPDOWN */
.dropdown-menu.show {
  display: block;
  z-index: 999;
}

/* HAMBURGER */
.menu-toggle {
  display: none;
  flex-direction: column;
  cursor: pointer;
}

.menu-toggle div {
  width: 25px;
  height: 3px;
  background: white;
  margin: 4px;
}

/* MOBILE */
@media (max-width: 768px) {

  .menu-toggle {
    display: flex;
  }

  .nav-links {
    display: none;
    flex-direction: column;
    width: 100%;
    background: #222;
    position: absolute;
    top: 70px;
    left: 0;
  padding-left: 60px;}

  .nav-links.active {
    display: flex;
  }
 .navbar{
  width: 100%;
 }
  .dropdown-menu {
    position: static;
    z-index: 999;
  }
}
</style>
</head>

<body>
